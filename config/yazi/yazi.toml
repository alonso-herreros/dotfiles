# A TOML linter such as Tombi can use this schema to validate your config.
# If you encounter any problems, please file an issue at https://github.com/yazi-rs/schemas.

#:schema https://yazi-rs.github.io/schemas/yazi.json

[mgr]
ratio           = [ 2, 7, 5 ]
sort_by         = "natural"
sort_sensitive  = false
sort_reverse    = false
sort_dir_first  = true
sort_translit   = false
sort_fallback   = "alphabetical"
linemode        = "none"
show_hidden     = false
show_symlink    = false
scrolloff       = 4
mouse_events    = [ "click", "scroll", "touch", "move", "drag" ]
title_format    = "Yazi: {cwd}"

[preview]
wrap            = "no"
tab_size        = 4
max_width       = 600
max_height      = 900
cache_dir       = ""
image_delay     = 30
image_filter    = "triangle"
image_quality   = 75
ueberzug_scale  = 1
ueberzug_offset = [ 0, 0, 0, 0 ]

[opener]

open = [
	{ run = "xdg-open %s1",    desc = "Open", for = "linux",     orphan = true },
	{ run = "open %s",         desc = "Open", for = "macos" },
	{ run = 'start "" %s1',    desc = "Open", for = "windows",   orphan = true },
	{ run = "termux-open %s1", desc = "Open", for = "android" },
]

edit = [
	{ run = "${EDITOR:-vi} %s", desc = "$EDITOR", for = "unix",    block = true },
	{ run = "vim %s",           desc = "Vim",     block = true },
	{ run = "code %s",          desc = "Code",    orphan = true },
]

view = [
	{ run = "less %s",   desc = "Less",       for = "unix",  block = true },
	{ run = "bat -n --paging=always %s", desc = "Bat",        for = "unix",  block = true },
	{ run = "vim -R %s", desc = "Vim (view)", block = true},
]

reveal = [
	{ run = "xdg-open %d1",         desc = "Reveal", for = "linux" },
	{ run = "open -R %s1",          desc = "Reveal", for = "macos" },
	{ run = "explorer /select,%s1", desc = "Reveal", for = "windows",   orphan = true },
	{ run = "termux-open %d1",      desc = "Reveal", for = "android" },
	{ run = "clear; exiftool %s1; echo 'Press enter to exit'; read _", desc = "Show EXIF", for = "unix", block = true },
]

checksum = [
	{ run = "sha256sum %s; read _", desc = "SHA256", block=true },
	{ run = "diff <(sha256sum %s | cut -d ' ' -f 1) <(wl-paste)", desc = "Compare SHA256 with clipboard", block=true },
	{ run = "md5sum %s; read _", desc = "MD5", block=true },
	{ run = "diff <(md5sum %s | cut -d ' ' -f 1) <(wl-paste)", desc = "Compare MD5 with clipboard", block=true },
]

extract = [
	{ run = "ya pub extract --list %s", desc = "Extract here" },
]

play = [
	{ run = "xdg-open %s1",                desc = "Play", for = "linux" },
	{ run = "open %s",                     desc = "Play", for = "macos" },
	{ run = 'start "" %s1', orphan = true, desc = "Play", for = "windows" },
	{ run = "termux-open %s1",             desc = "Play", for = "android" },
	{ run = "mpv --force-window %s",       desc = "MPV",  orphan = true },
]

pdf = [
	{ run = "okular %s &",                           desc = "Open with Okular",  for = "linux", orphan = true },
	{ run = "zathura --fork %s",                     desc = "Open with Zathura", for = "linux", orphan = true },
	{ run = "qpdf --empty --pages %s -- merged.pdf", desc = "Merge PDFs",        for = "linux", orphan = true },
]

image = [
	{ run = "mpv %s", desc = "MPV",  orphan = true },
	{ run = "gimp %s &",                                       desc = "GIMP",   for = "linux", orphan = true },
	{ run = 'f=%s; swappy -f %s -o "${f%.*}-edit.${f##*.}" &', desc = "Swappy", for = "linux", orphan = true },
]

qalc = [
	{ run = 'qalc -f "$@" -i', desc = "Open with QALC", for = "linux", block = true },
]

download = [
	{ run = "ya emit download --open %S", desc = "Download and open" },
	{ run = "ya emit download %S",        desc = "Download" },
]

[open]
rules = [
	# Empty file
	{ mime = "inode/empty", use = [ "edit", "reveal" ] },
	# Folder
	{ url = "*/", use = [ "edit", "open", "reveal" ] },

	# PDF
	{ mime = "application/pdf", use = [ "open", "pdf", "reveal" ] },

	# Images
	{ mime = "image/*", use = [ "open", "image", "reveal" ] },

	# QALC
	{ url  = "*.qalc", use = [ "edit", "qalc", "view", "reveal" ] },

	# Text
	{ mime = "text/html", use = [ "open", "edit", "view", "reveal", "checksum" ] },
	{ mime = "text/*", use = [ "edit", "view", "reveal", "checksum" ] },

	# Media
	{ mime = "{audio,video}/*", use = [ "play", "reveal", "checksum" ] },
	# Code
	{ mime = "application/{json,ndjson,javascript,wine-extension-ini}", use = [ "edit", "view", "reveal", "checksum" ] },
	# Archive
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [ "extract", "reveal", "checksum" ] },
	# Virtual file system
	{ mime = "vfs/{absent,stale}", use = "download" },
	# Deb package
	{ url = "*.deb", use = [ "open", "reveal", "checksum" ] },
	# Fallback
	{ url = "*", use = [ "open", "edit", "view", "reveal", "checksum" ] },
]

[tasks]
file_workers     = 3
plugin_workers   = 5
fetch_workers    = 5
preload_workers  = 2
process_workers  = 5
bizarre_retry    = 3
image_alloc      = 268435456  # 256MB
image_bound      = [ 0, 0 ]
suppress_preload = false

[plugin]

fetchers = [
	# MIME-type
	{ url = "*/",         run = "mime.dir",    prio = "high", group = "mime" },
	{ url = "local://*",  run = "mime.local",  prio = "high", group = "mime" },
	{ url = "remote://*", run = "mime.remote", prio = "high", group = "mime" },
	{ url = "*/",         run = "git",                        group = "git" },
	{ url = "local://*",  run = "git",                        group = "git" },
]

spotters = [
	# Multi-file
	{ mime = "multi/*", run = "multi" },
	# Folder
	{ url = "*/", run = "folder" },
	# Code
	{ mime = "text/*", run = "code" },
	{ mime = "application/{mbox,javascript,wine-extension-ini}", run = "code" },
	# Image
	{ mime = "image/{avif,hei?,jxl}", run = "magick" },
	{ mime = "image/svg+xml", run = "svg" },
	{ mime = "image/*", run = "image" },
	# Video
	{ mime = "video/*", run = "video" },
	# Virtual file system
	{ mime = "vfs/*", run = "vfs" },
	# Error
	{ mime = "null/*", run = "null" },
	# Fallback
	{ url = "*", run = "file" },
]

preloaders = [
	# Image
	{ mime = "image/{avif,hei?,jxl}", run = "magick" },
	{ mime = "image/svg+xml", run = "svg" },
	{ mime = "image/*", run = "image" },
	# Video
	{ mime = "video/*", run = "video" },
	# PDF
	{ mime = "application/pdf", run = "pdf" },
	# Font
	{ mime = "font/*", run = "font" },
	{ mime = "application/ms-opentype", run = "font" },
]

previewers = [
	{ url = "*/", run = "folder" },

	# Code
	{ mime = "text/*", run = "code" },
	{ mime = "application/{mbox,javascript,wine-extension-ini}", run = "code" },

	# JSON
	{ mime = "application/{json,ndjson}", run = "json" },

	# Image
	{ mime = "image/{avif,hei?,jxl}", run = "magick" },
	{ mime = "image/svg+xml", run = "svg" },
	{ mime = "image/*", run = "image" },

	# Video
	{ mime = "video/*", run = "video" },
	# PDF
	{ mime = "application/pdf", run = "pdf" },

	# Archive
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", run = "archive" },
	{ mime = "application/{debian*-package,redhat-package-manager,rpm,android.package-archive}", run = "archive" },
	{ url = "*.{AppImage,appimage}", run = "archive" },
	# Virtual Disk / Disk Image
	{ mime = "application/{iso9660-image,qemu-disk,ms-wim,apple-diskimage}", run = "archive" },
	{ mime = "application/virtualbox-{vhd,vhdx}", run = "archive" },
	{ url = "*.{img,fat,ext,ext2,ext3,ext4,squashfs,ntfs,hfs,hfsx}", run = "archive" },
	# Font
	{ mime = "font/*", run = "font" },
	{ mime = "application/ms-opentype", run = "font" },

	# Empty file
	{ mime = "inode/empty", run = "empty" },
	# Virtual file system
	{ mime = "vfs/*", run = "vfs" },
	# Error
	{ mime = "null/*", run = "null" },
	# Fallback
	{ url = "*", run = "file" },
]

[input]
cursor_blink = false

# cd
cd_title  = "Change directory:"
cd_origin = "bottom-center"
cd_offset = [ 0, 2, 50, 3 ]

# create
create_title  = [ "Create:" , "Create dir:"]
create_origin = "bottom-center"
create_offset = [ 0, 2, 50, 3 ]

# rename
rename_title  = "Rename:"
rename_origin = "hovered"
rename_offset = [ 0, 1, 50, 3 ]

# filter
filter_title  = "Filter:"
filter_origin = "bottom-center"
filter_offset = [ 0, 2, 50, 3 ]

# find
find_title  = [ "Find next:", "Find previous:" ]
find_origin = "bottom-center"
find_offset = [ 0, 2, 50, 3 ]

# search
search_title  = "Search via {n}:"
search_origin = "bottom-center"
search_offset = [ 0, 2, 50, 3 ]

# shell
shell_title  = [ "Shell:", "Shell (block):" ]
shell_origin = "bottom-center"
shell_offset = [ 0, 2, 50, 3 ]

[confirm]
# trash
trash_title  = "Trash {n} selected file{s}?"
trash_origin = "center"
trash_offset = [ 0, 0, 70, 20 ]

# delete
delete_title  = "Permanently delete {n} selected file{s}?"
delete_origin = "center"
delete_offset = [ 0, 0, 70, 20 ]

# overwrite
overwrite_title  = "Overwrite file?"
overwrite_body   = "Will overwrite the following file:"
overwrite_origin = "center"
overwrite_offset = [ 0, 0, 50, 15 ]

# quit
quit_title  = "Quit?"
quit_body   = "There are unfinished tasks, quit anyway?"
quit_origin = "center"
quit_offset = [ 0, 0, 50, 15 ]

[pick]
open_title  = "Open with:"
open_origin = "hovered"
open_offset = [ 0, 1, 50, 7 ]

[which]
sort_by        = "none"
sort_sensitive = false
sort_reverse   = false
sort_translit  = false

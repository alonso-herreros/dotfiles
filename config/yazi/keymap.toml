# A TOML linter such as https://taplo.tamasfe.dev/ can use this schema to validate your config.  If you encounter any issues, please make an issue at
# https://github.com/yazi-rs/schemas.
"$schema"="https://yazi-rs.github.io/schemas/keymap.json"

##=================================================================##
##                           GENERAL                               ##
##=================================================================##
[mgr]
keymap=[
	#|====< GLOBAL >===========================================|

	###|~~~ Quitting ~~~~~~~~~~~~~~~~~~
	{ on="q",     run="close",   desc="Close tab, or quit if last tab" },
	{ on="<C-w>", run="close",   desc="Close tab, or quit if last tab" },
	{ on="<C-z>", run="suspend", desc="Suspend the process" },
	{ on="Q",     run="quit",    desc="Quit" },
	{ on="<C-q>", run="quit --no-cwd-file", desc="Quit (no cwd)" },

	###|~~~ Canceling ~~~~~~~~~~~~~~~~~
	{ on="<Esc>", run="escape",  desc="Exit Visual or clear selection/search" },
	{ on="<C-[>", run="escape",  desc="Exit Visual or clear selection/search" },
	{ on="<C-c>", run=["escape", "unyank"],  desc="Cancel anything" },

	###|~~~ Shell ~~~~~~~~~~~~~~~~~~~~~
	{ on="!", run="shell '$SHELL' --block", desc="Drop to shell" },

	{
		on=";", run="plugin custom-shell -- auto --interactive",
		desc="Run a shell command"
	}, {
		on=":", run="plugin custom-shell -- auto --block --interactive",
		desc="Run a shell command (blocking)"
	},


	#|====< NAVIGATION >=======================================|

	##|---< Hopping >---------------------------|
	{ on="k",      run="arrow prev", desc="Move cursor up" },
	{ on="j",      run="arrow next", desc="Move cursor down" },
	{ on="<Up>",   run="arrow prev", desc="Move cursor up" },
	{ on="<Down>", run="arrow next", desc="Move cursor down" },

	{ on="K",     run="arrow -50%",  desc="Move cursor up half page" },
	{ on="J",     run="arrow 50%",   desc="Move cursor down half page" },
	{ on="<C-b>", run="arrow -100%", desc="Move cursor up one page" },
	{ on="<C-f>", run="arrow 100%",  desc="Move cursor down one page" },

	{ on="<S-PageUp>",   run="arrow -50%",  desc="Move cursor up half page" },
	{ on="<S-PageDown>", run="arrow 50%",   desc="Move cursor down half page" },
	{ on="<PageUp>",     run="arrow -100%", desc="Move cursor up one page" },
	{ on="<PageDown>",   run="arrow 100%",  desc="Move cursor down one page" },

	{ on=["g", "g"], run="arrow top", desc="Move cursor to the top" },
	{ on="G",        run="arrow bot", desc="Move cursor to the bottom" },

	##|---< Entering and leaving >--------------|
	{ on="h",       run="leave", desc="Go to parent directory" },
	{ on="l",       run="enter", desc="Enter directory" },
	{ on="<Left>",  run="leave", desc="Go to parent directory" },
	{ on="<Right>", run="enter", desc="Enter directory" },

	{ on="-", run="back",        desc="Go back to the previous directory" },

	{ on=["g", "f"], run="follow", desc="Follow symlink" },

	##|---< Goto >------------------------------|
	{ on=["g", "<Space>"], run="cd --interactive",  desc="cd..." },
	{ on=["~"],      run="cd ~",                    desc="Go: ~" },
	{ on=["'", "~"], run="cd ~",                    desc="Go: ~" },
	{ on=["'", "/"], run="cd /",                    desc="Go: /" },
	{ on=["'", "0"], run="cd /",                    desc="Go: /" },
	{ on=["'", "V"], run="cd /virt",                desc="Go: /virt" },
	{ on=["'", "c"], run="cd ~/.config",            desc="Go: .config" },
	{ on=["'", "."], run="cd ~/.dotfiles",          desc="Go: .dotfiles" },
	{ on=["'", "b"], run="cd ~/.bookmarks",         desc="Go: .bookmarks" },
	{ on=["'", "t"], run="cd ~/tmp",                desc="Go: tmp" },
	{ on=["'", "d"], run="cd ~/Downloads",          desc="Go: Downloads" },
	{ on=["'", "D"], run="cd ~/Documents",          desc="Go: Documents" },
	{ on=["'", "p"], run="cd ~/Pictures",           desc="Go: Pictures" },
	{ on=["'", "v"], run="cd ~/Videos",             desc="Go: Videos" },
	{ on=["'", "P"], run="cd ~/Projects",           desc="Go: Projects" },
	{ on=["'", "T"], run="cd ~/.local/share/Trash", desc="Go: Trash" },

	###|~~~ Bookmarks ~~~~~~~~~~~~~~~~~
	{ on=["m"], run="plugin bookmarks save",   desc="Create mark here" },
	{ on=["`"], run="plugin bookmarks jump",   desc="Go to mark" },
	{ on=["M"], run="plugin bookmarks delete", desc="Delete mark" },

	###|~~~ fzf & Zoxide ~~~~~~~~~~~~~~
	{ on="z", run="plugin zoxide", desc="Zoxide" },
	{ on="Z", run="plugin fzf",    desc="Jump to a directory or reveal a file using fzf" },

	#|====< SELECTION >========================================|

	{ on="<Space>", run=["toggle", "arrow 1"], desc="Toggle selected" },
	{ on="v",       run="visual_mode",         desc="Enter visual selection mode" },
	{ on="V",       run="visual_mode --unset", desc="Enter visual deselection mode" },
	{ on="<C-a>",   run="toggle_all --state=true", desc="Select all" },
	{ on="<C-i>",   run="toggle_all",          desc="Invert selection" },
	{ on="<C-A>",   run="escape --select",     desc="Cancel selection" },


	#|====< MANAGEMENT >=======================================|

	##|---< Copying paths and names >-----------|
	{ on="Y",        run="copy path",             desc="Copy file path" },
	{ on=["c", "p"], run="copy path",             desc="Copy file path" },
	{ on=["c", "d"], run="copy dirname",          desc="Copy dir path" },
	{ on=["c", "f"], run="copy filename",         desc="Copy filename" },
	{ on=["c", "n"], run="copy name_without_ext", desc="Copy name (no ext.)" },

	##|---< Copy-pasting >----------------------|
	{ on="y",        run=[
		"shell -- command -v wl-copy && for path in %s; do echo \"file://$path\"; done | wl-copy -t text/uri-list",
		"yank" ],                           desc="Yank selection" },
	{ on="x",        run="yank --cut",      desc="Cut selection" },
	{ on="p",        run="paste",           desc="Paste yanked" },
	{ on=["@", "s"], run="link",            desc="Symlink yanked" },
	{ on=["@", "r"], run="link --relative", desc="Symlink yanked (relative)" },
	{ on=["@", "h"], run="hardlink",        desc="Hardlink yanked" },

	##|---< Deleting >--------------------------|
	{ on="d",        run="remove",               desc="Trash selected files" },
	{ on="X",        run="remove --hovered",     desc="Trash hovered file" },
	{ on="D",        run="remove --permanently", desc="Permanently delete selected files" },
	{ on=["g", "D"], run="shell -- shred -u %s", desc="Shred selected files" },

	##|---< Creating >--------------------------|
	{ on="a",        run="create",       desc="Add file (ending / for dir)" },
	{ on="A",        run="create --dir", desc="Add directory" },

	##|---< Renaming >--------------------------|
	{ on="<F2>",  run="rename --cursor=before_ext", desc="Rename" },
	{ on="r",     run="rename --cursor=before_ext", desc="Rename" },
	{ on="<A-r>", run="rename --empty=stem",        desc="Rename before ext" },
	{ on="R",     run="rename --empty=all",         desc="Rewrite filename" },
	{ on="<C-r>", run=["toggle_all --state=true", "rename"], desc="Rename all" },


	#|====< OPERATION >========================================|

	##|---< Simple opening >--------------------|
	{ on="<Enter>",   run="plugin smart-enter", desc="Open files(s) or enter" },
	{ on="<S-Enter>", run="open --interactive", desc="Open with..." },
	{ on="o",         run="open --interactive", desc="Open with..." },
	{ on="O", run="shell ' %s' --block --interactive --cursor=0", desc="Open (command)" },

	##|---< Common tools >----------------------|
	{ on="P",        run="shell --block -- $PAGER %s",  desc="Open: PAGER" },
	{ on="E",        run="shell --block -- $EDITOR %s", desc="Open: EDITOR" },
	{ on=["g", "e"], run="shell --block -- $EDITOR %s", desc="Open: EDITOR" },
	{ on=["g", "?"], run="shell --block -- stat %s | $PAGER", desc="Stat" },
	{ on=["g", "i"], run="shell --block -- exiftool %s | $PAGER", desc="See EXIF" },

	##|---< Drag and drop >---------------------|
	# { on="<C-d>",     run="shell 'dragon-drop -x -i -T -a \"%s\"'" },
	{ on="<C-d>", run="shell -- ripdrag -Ax -W200 -H100 %s &", desc="Drag and drop" },

	##|---< GPG >-------------------------------|
	{
		on=["g", "p", "g", "c"], run=["shell --block -- gpg -c %s"],
		desc="GPG encrypt symmetric"
	}, {
		on=["g", "p", "g", "d"], run=["shell --block -- gpg -d %s > %s-"],
		desc="GPG decrypt symmetric"
	}, {
		on=["g", "p", "g", "o"],
		run=["shell --block --interactive -- gpg -d %s | "],
		desc="GPG decrypt symmetric to pipe (block)"
	}, {
		on=["g", "p", "g", "O"],
		run=["shell --orphan --interactive -- gpg -d %s | "],
		desc="GPG decrypt symmetric to pipe (orphan)"
	},

	##|---< Git >-------------------------------|
	{
		on=["g", "s"],
		run=["shell --block -- git -c color.status=always status | less -R"],
		desc="Git Status"
	}, {
		on=["g", "a"], run=['shell         -- git add %s'],
		desc="Git Add"
	}, {
		on=["g", "A"], run=['shell --block -- git add -p %s'],
		desc="Git Add patches"
	}, {
		on=["g", "r"], run=['shell         -- git restore --staged %s'],
		desc="Git Unstage"
	}, {
		on=["g", "c"], run=["shell --block -- git commit"],
		desc="Git Commit"
	},

	##|---< Zipping >---------------------------|
	{
		on=["g", "z"],
		run=[
			"shell --interactive -- zip -r zipped $(realpath --relative-to=\"$PWD\" %s)",
			"toggle_all --state=false"
		],
		desc="Zip files"
	},

	##|---< Mounting >--------------------------|
	{ on=["g", "m"], run="plugin mount", desc="Mount" },


	#|====< DISPLAY >==========================================|

	##|---< Toggles >---------------------------|
	{ on=".",     run="hidden toggle", desc="Toggle hidden files" },
	{ on="<A-v>", run="plugin toggle-pane min-preview", desc="Toggle preview" },
	{ on="<A-p>", run="plugin toggle-pane min-parent", desc="Toggle parent" },

	##|---< Filter, find, search >--------------|
	{ on="&", run="filter --smart",          desc="Filter files" },
	{ on="/", run="find --smart",            desc="Find next file" },
	{ on="n", run="find_arrow",              desc="Go to the next found" },
	{ on="N", run="find_arrow --previous",   desc="Go to the previous found" },
	{ on="s", run="search fd", desc="Search files by name using fd" },
	{ on="S", run="search rg", desc="Search file contents (ripgrep)" },

	##|---< Linemodes >-------------------------|
	{ on=["?", "s"], run="linemode size",        desc="Linemode: size" },
	{ on=["?", "p"], run="linemode permissions", desc="Linemode: permissions" },
	{ on=["?", "c"], run="linemode btime",       desc="Linemode: btime" },
	{ on=["?", "m"], run="linemode mtime",       desc="Linemode: mtime" },
	{ on=["?", "o"], run="linemode owner",       desc="Linemode: owner" },
	{ on=["?", "n"], run="linemode none",        desc="Linemode: none" },

	##|---< Sorting >---------------------------|
	{
		on=[",", "m"], run=["sort mtime", "linemode mtime"],
		desc="Sort: ↓ modified time"
	}, {
		on=[",", "M"], run=["sort mtime --reverse", "linemode mtime"],
		desc="Sort: ↑ modified time"
	}, {
		on=[",", "c"], run=["sort btime", "linemode ctime"],
		desc="Sort: ↓ created time"
	}, {
		on=[",", "C"], run=["sort btime --reverse", "linemode ctime"],
		desc="Sort: ↑ created time"
	}, {
		on=[",", "s"], run=["sort size", "linemode size"],
		desc="Sort: ↓ size"
	}, {
		on=[",", "S"], run=["sort size --reverse", "linemode size"],
		desc="Sort: ↑ size"
	}, {
		on=[",", "e"], run="sort extension",
		desc="Sort: ↓ extension"
	}, {
		on=[",", "E"], run="sort extension --reverse",
		desc="Sort: ↑ extension"
	}, {
		on=[",", "a"], run="sort alphabetical",
		desc="Sort: ↓ alphabetically"
	}, {
		on=[",", "A"], run="sort alphabetical --reverse",
		desc="Sort: ↑ alphabetically"
	}, {
		on=[",", "n"], run="sort natural", desc="Sort: ↓ naturally"
	}, {
		on=[",", "N"], run="sort natural --reverse",
		desc="Sort: ↑ naturally"
	}, {
		on=[",", "r"], run="sort random",
		desc="Sort: randomly"
	},


	#|====< Tabs >=============================================|

	# ==== Create tab ====
	{ on="t", run="tab_create --current", desc="Split to tab" },
	{ on="T", run="tab_create",           desc="New tab" },

	# ==== Swith tabs ====
	{ on="1", run="tab_switch 0", desc="Switch to tab 1" },
	{ on="2", run="tab_switch 1", desc="Switch to tab 2" },
	{ on="3", run="tab_switch 2", desc="Switch to tab 3" },
	{ on="4", run="tab_switch 3", desc="Switch to tab 4" },
	{ on="5", run="tab_switch 4", desc="Switch to tab 5" },
	{ on="6", run="tab_switch 5", desc="Switch to tab 6" },
	{ on="7", run="tab_switch 6", desc="Switch to tab 7" },
	{ on="8", run="tab_switch 7", desc="Switch to tab 8" },
	{ on="9", run="tab_switch 8", desc="Switch to tab 9" },

	{ on="<A-h>", run="tab_switch -1 --relative", desc="Previous tab" },
	{ on="<A-l>", run="tab_switch 1 --relative",  desc="Next tab" },

	# ==== Swap tabs ====
	{ on="<A-H>", run="tab_swap -1", desc="Swap tab with previous" },
	{ on="<A-L>", run="tab_swap 1",  desc="Swap tab with next" },


	#|====< MISC >=============================================|

	# ==== Preview ====
	{ on="<A-k>", run="seek -5", desc="Seek up 5 units in the preview" },
	{ on="<A-j>", run="seek 5",  desc="Seek down 5 units in the preview" },
	# ==== Tasks ====
	{ on="w", run="tasks_show", desc="Show task manager" },

	# ==== Help ====
	{ on="<F1>", run="help", desc="Open help" },
]

##=================================================================##
##                            TASKS                                ##
##=================================================================##
[tasks]
keymap=[
	{ on="<Esc>", run="close", desc="Close task manager" },
	{ on="<C-[>", run="close", desc="Close task manager" },
	{ on="<C-c>", run="close", desc="Close task manager" },
	{ on="w",     run="close", desc="Close task manager" },

	{ on="k", run="arrow -1", desc="Move cursor up" },
	{ on="j", run="arrow 1",  desc="Move cursor down" },

	{ on="<Up>",   run="arrow -1", desc="Move cursor up" },
	{ on="<Down>", run="arrow 1",  desc="Move cursor down" },

	{ on="<Enter>", run="inspect", desc="Inspect the task" },
	{ on="x",       run="cancel",  desc="Cancel the task" },

	# Help
	{ on="<F1>", run="help", desc="Open help" },
]

##=================================================================##
##                             PICK                                ##
##=================================================================##
[pick]
keymap=[
	{ on="<Esc>",   run="close",          desc="Cancel selection" },
	{ on="<C-[>",   run="close",          desc="Cancel selection" },
	{ on="<C-c>",   run="close",          desc="Cancel selection" },
	{ on="<Enter>", run="close --submit", desc="Submit the selection" },

	{ on="k", run="arrow -1", desc="Move cursor up" },
	{ on="j", run="arrow 1",  desc="Move cursor down" },
	{ on="<Up>",   run="arrow -1", desc="Move cursor up" },
	{ on="<Down>", run="arrow 1",  desc="Move cursor down" },

	# Help
	{ on="<F1>", run="help", desc="Open help" },
]

##=================================================================##
##                            INPUT                                ##
##=================================================================##
[input]
keymap=[
	{ on="<C-c>",   run="close",          desc="Cancel input" },
	{ on="<Enter>", run="close --submit", desc="Submit input" },
	{ on="<Esc>",   run="escape",         desc="Go back the normal mode, or cancel input" },
	{ on="<C-[>",   run="escape",         desc="Go back the normal mode, or cancel input" },

	# Mode
	{ on="i", run="insert",          desc="Enter insert mode" },
	{ on="a", run="insert --append", desc="Enter append mode" },

	{
		on="I", run=["move -999", "insert"],
		desc="Move to the BOL, and enter insert mode"
	}, {
		on="A", run=["move 999", "insert --append"],
		desc="Move to the EOL, and enter append mode"
	}, {
		on="v", run="visual",
		desc="Enter visual mode"
	}, {
		on="V", run=["move -999", "visual", "move 999"],
		desc="Enter visual mode and select all"
	},

	# Character-wise movement
	{ on="h",       run="move -1", desc="Move back a character" },
	{ on="l",       run="move 1",  desc="Move forward a character" },
	{ on="<Left>",  run="move -1", desc="Move back a character" },
	{ on="<Right>", run="move 1",  desc="Move forward a character" },
	{ on="<C-b>",   run="move -1", desc="Move back a character" },
	{ on="<C-f>",   run="move 1",  desc="Move forward a character" },

	# Word-wise movement
	{
		on="b",  run="backward",
		desc="Move back to the start of the current or previous word"
	}, {
		on="w",  run="forward",
		desc="Move forward to the start of the next word"
	}, {
		on="e",  run="forward --end-of-word",
		desc="Move forward to the end of the current or next word"
	}, {
		on="<A-b>", run="backward",
		desc="Move back to the start of the current or previous word"
	}, {
		on="<A-f>", run="forward --end-of-word",
		desc="Move forward to the end of the current or next word"
	},

	# Line-wise movement
	{ on="0",      run="move -999", desc="Move to BOL" },
	{ on="$",      run="move 999",  desc="Move to EOL" },
	{ on="<C-a>",  run="move -999", desc="Move to BOL" },
	{ on="<C-e>",  run="move 999",  desc="Move to EOL" },
	{ on="<Home>", run="move -999", desc="Move to BOL" },
	{ on="<End>",  run="move 999",  desc="Move to EOL" },

	# Delete
	{ on="<Backspace>", run="backspace",         desc="Backspace (no buffer)" },
	{ on="<Delete>",    run="backspace --under", desc="Delete (no buffer)" },
	{ on="<C-h>",       run="backspace",         desc="Backspace (no buffer)" },
	{ on="<C-d>",       run="backspace --under", desc="Delete (no buffer)" },
	{ on="<C-w>",       run="kill backward",     desc="Delete start of word" },
	{ on="<A-d>",       run="kill forward",      desc="Delete end of word" },
	{ on="<C-u>",       run="kill bol",          desc="Clear to BOL" },
	{ on="<C-k>",       run="kill eol",          desc="Clear to EOL" },

	# Cut/Yank/Paste
	{ on="d", run="delete --cut",                        desc="Delete..." },
	{ on="D", run=["delete --cut", "move 999"],          desc="Delete to EOL" },
	{ on="x", run=["delete --cut", "move 1 --in-operating"], desc="Delete char" },
	{ on="c", run="delete --cut --insert",               desc="Change..." },
	{ on="C", run=["delete --cut --insert", "move 999"], desc="Change to EOL" },
	{ on="y", run="yank",           desc="Yank" },
	{ on="p", run="paste",          desc="Put (after cursor)" },
	{ on="P", run="paste --before", desc="Put (before cursor)" },

	# Undo/Redo
	{ on="u",     run="undo", desc="Undo" },
	{ on="<C-r>", run="redo", desc="Redo" },

	# Help
	{ on="<F1>", run="help", desc="Open help" },
]

##=================================================================##
##                            CONFIRM                              ##
##=================================================================##
[confirm]
keymap=[
	{ on="<Esc>",   run="close",          desc="Cancel operation" },
	{ on="<C-[>",   run="close",          desc="Cancel operation" },
	{ on="<C-c>",   run="close",          desc="Cancel operation" },
	{ on="<Enter>", run="close --submit", desc="Confirm operation" },

	{ on="n", run="close",          desc="Cancel operation" },
	{ on="y", run="close --submit", desc="Confirm operation" },

	{ on="k", run="arrow -1", desc="Move cursor up" },
	{ on="j", run="arrow 1",  desc="Move cursor down" },

	{ on="<Up>",   run="arrow -1", desc="Move cursor up" },
	{ on="<Down>", run="arrow 1",  desc="Move cursor down" },

	# Help
	{ on="<F1>", run="help", desc="Open help" },
]

##=================================================================##
##                          COMPLETION                             ##
##=================================================================##
[completion]
keymap=[
	{ on="<C-c>",   run="close",          desc="Cancel completion" },
	{ on="<Tab>",   run="close --submit", desc="Confirm completion" },
	{
		on="<Enter>", run=["close --submit", "close_input --submit"],
		desc="Confirm the completion and input"
	},

	{ on="<A-k>", run="arrow -1", desc="Move cursor up" },
	{ on="<A-j>", run="arrow 1",  desc="Move cursor down" },

	{ on="<Up>",   run="arrow -1", desc="Move cursor up" },
	{ on="<Down>", run="arrow 1",  desc="Move cursor down" },

	{ on="<C-p>", run="arrow -1", desc="Move cursor up" },
	{ on="<C-n>", run="arrow 1",  desc="Move cursor down" },

	# Help
	{ on="<F1>", run="help", desc="Open help" },
]

##=================================================================##
##                             HELP                                ##
##=================================================================##
[help]
keymap=[
	{ on="<Esc>", run="escape", desc="Clear the filter, or hide the help" },
	{ on="<C-[>", run="escape", desc="Clear the filter, or hide the help" },
	{ on="q",     run="close",  desc="Exit the process" },
	{ on="<C-c>", run="close",  desc="Hide the help" },

	# Navigation
	{ on="k", run="arrow -1", desc="Move cursor up" },
	{ on="j", run="arrow 1",  desc="Move cursor down" },

	{ on="<Up>",   run="arrow -1", desc="Move cursor up" },
	{ on="<Down>", run="arrow 1",  desc="Move cursor down" },

	# Filtering
	{ on="f", run="filter", desc="Apply a filter for the help items" },
]

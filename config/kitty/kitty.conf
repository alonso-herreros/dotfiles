# See kitty.conf(5)

# ==== Fonts ===============================================

# ---- Font family, style and size ---------------
font_family      family="Fira Code" style="Retina"
bold_font        family="Fira Code" style="Bold"
# Italic Fira Mono from https://github.com/Avi-D-coder/fira-mono-italic
italic_font      family="Fira Mono" style="Regular Italic"
bold_italic_font family="Fira Mono" style="Bold Italic"

font_size 11.0

# ---- Font features and ligatures ---------------

disable_ligatures cursor

# E.g.:
#     font_features FiraCode-Retina +zero +onum
#     font_features TT2020StyleB-Regular -liga +calt
#     font_features UnifontMedium +isol -medi -fina -init
# or
#     font_features none
font_features FiraCode-Retina  +calt
    \ +cv01 +cv02 +cv06 -cv10 +ss01 -ss10
    \ +zero +cv15 +cv18 +ss02 +ss03 +ss04 -ss05 +ss06 +ss07
    \ +zero +cv15 +cv18 +ss02 +ss03 +ss04 -ss05 +ss06 +ss07
#   \ +cv20 -ss02

font_features FiraCode-Regular +calt
    \ +cv01 +cv02 +cv06 -cv10 +ss01 -ss10
    \ +zero +cv15 +cv18 +ss02 +ss03 +ss04 -ss05 +ss06 +ss07
#   \ +cv20 -ss02

font_features FiraCode-Bold    +calt
    \ +cv01 +cv02 +cv06 -cv10 +ss01 -ss10
    \ +zero +cv15 +cv18 +ss02 +ss03 +ss04 -ss05 +ss06 +ss07
#   \ +cv20 -ss02


# ---- Font drawing options ----------------------

# E.g.:
#     modify_font underline_position -2
#     modify_font underline_thickness 150%
#     modify_font strikethrough_position 2px
# or
#     modify_font cell_width 100%
#     modify_font cell_height -2px
#     modify_font baseline -1
modify_font cell_width 100%

#box_drawing_scale 0.001, 1, 1.5, 2
#undercurl_style thin-sparse
#text_composition_strategy platform
#text_fg_override_threshold 0

# ---- Unusual font options ----------------------
#force_ltr no

# Syntax: symbol_map codepoints Font Family Name
# E.g.: symbol_map U+E0A0-U+E0A3,U+E0C0-U+E0C7 PowerlineSymbols
#symbol_map

# Syntax: narrow_symbols codepoints [number of cells]
# This option can be specified multiple times.
# E.g. narrow_symbols U+E0A0-U+E0A3,U+E0C0-U+E0C7 1
#narrow_symbols

# ==== Cursor customization ================================

#cursor #cccccc
#cursor_text_color #111111

#cursor_shape block
#cursor_beam_thickness 1.5
#cursor_underline_thickness 2.0

#cursor_blink_interval -1
#cursor_stop_blinking_after 15.0

# ==== Scrollback ==========================================

#scrollback_lines 2000

#scrollback_indicator_opacity 1.0

#scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
#scrollback_pager_history_size 0

#scrollback_fill_enlarged_window no

#wheel_scroll_multiplier 5.0
#wheel_scroll_min_lines 1
touch_scroll_multiplier 8.0

# ==== Mouse ===============================================

#mouse_hide_wait 3.0

#url_color #0087bd

# Can be one of: none, straight, double, curly, dotted, dashed.
#url_style curly

#open_url_with default

url_prefixes file ftp ftps gemini git gopher http https irc ircs kitty mailto news sftp ssh
detect_urls yes
#url_excluded_characters
#show_hyperlink_targets no
#underline_hyperlinks hover

#copy_on_select no

# Actions to take when pasting. Supports: quote-urls-at-prompt,
# replace-dangerous-control-codes, replace-newline, confirm, confirm-if-large,
# filter, no-op
#paste_actions quote-urls-at-prompt,confirm

#strip_trailing_spaces never

#select_by_word_characters @-./_~?&=%+#
# If empty (default) select_by_word_characters will be used
#select_by_word_characters_forward

#click_interval -1.0

#focus_follows_mouse no

#pointer_shape_when_grabbed arrow
#default_pointer_shape beam
#pointer_shape_when_dragging beam

# ---- Mouse actions -----------------------------

#clear_all_mouse_actions no

# Remove all mouse action definitions up to this point. Useful, for
# instance, to remove the default mouse actions.

# Click the link under the mouse or move the cursor (shell integration)
#mouse_map left click ungrabbed mouse_handle_click selection link prompt

# Click the link under the mouse or move the cursor even when grabbed (shell
# integration)
#mouse_map shift+left click grabbed,ungrabbed mouse_handle_click selection link
#prompt

# Click the link under the mouse cursor (shell integration)
#mouse_map ctrl+shift+left release grabbed,ungrabbed mouse_handle_click link

# Discard press event for link click
#mouse_map ctrl+shift+left press grabbed discard_event

# Paste from the primary selection
#mouse_map middle release ungrabbed paste_from_selection

# Start selecting text
#mouse_map left press ungrabbed mouse_selection normal

# Start selecting text in a rectangle
mouse_map alt+shift+left press ungrabbed mouse_selection rectangle

# Select a word
mouse_map left doublepress ungrabbed mouse_selection word

# Select a line
mouse_map left triplepress ungrabbed mouse_selection line

# Select line from point
#mouse_map ctrl+alt+left triplepress ungrabbed mouse_selection line_from_point

# Extend the current selection
#mouse_map right press ungrabbed mouse_selection extend

# Paste from the primary selection even when grabbed
#mouse_map shift+middle release ungrabbed,grabbed paste_selection
#mouse_map shift+middle press grabbed discard_event

# Start selecting text even when grabbed
#mouse_map shift+left press ungrabbed,grabbed mouse_selection normal

# Start selecting text in a rectangle even when grabbed
#mouse_map ctrl+shift+alt+left press ungrabbed,grabbed mouse_selection rectangle

# Select a word even when grabbed
#mouse_map shift+left doublepress ungrabbed,grabbed mouse_selection word

# Select a line even when grabbed
#mouse_map shift+left triplepress ungrabbed,grabbed mouse_selection line

# Select line from point even when grabbed
#mouse_map ctrl+shift+alt+left triplepress ungrabbed,grabbed mouse_selection line_from_point

# Extend the current selection even when grabbed
#mouse_map shift+right press ungrabbed,grabbed mouse_selection extend

# Show clicked command output in pager (shell integration)
#mouse_map ctrl+shift+right press ungrabbed mouse_show_command_output

# ==== Performance tuning ==================================

repaint_delay 50
input_delay 5
#sync_to_monitor yes

# ==== Terminal bell =======================================

enable_audio_bell yes

visual_bell_duration 0.15
visual_bell_color darkred

window_alert_on_bell yes

#bell_on_tab "🔔 "

#command_on_bell none

bell_path /usr/share/sounds/freedesktop/stereo/bell.oga

#linux_bell_theme __custom

# ==== Window layout =======================================

remember_window_size  no
initial_window_width  640
initial_window_height 400

enabled_layouts all

#window_resize_step_cells 2
#window_resize_step_lines 2

#window_border_width 0.5pt
#draw_minimal_borders yes

#window_margin_width 0
#single_window_margin_width -1

#window_padding_width 0
#single_window_padding_width -1

#placement_strategy center

#active_border_color #00ff00
#inactive_border_color #cccccc
#bell_border_color #ff5a00

#inactive_text_alpha 1.0

#hide_window_decorations no

#window_logo_path none
#window_logo_position bottom-right
#window_logo_alpha 0.5

#resize_debounce_time 0.1 0.5

#resize_in_steps no

#visual_window_select_characters 1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ

confirm_os_window_close 0

# ==== Tab bar =============================================

tab_bar_edge top
# Can be one of: left, center, right.
#tab_bar_align left

#tab_bar_margin_width 0.0
#tab_bar_margin_height 0.0 0.0

# The tab bar style, can be one of: fade, slant, separator, powerline, custom,
# hidden
tab_bar_style powerline

#tab_bar_min_tabs 2

#tab_switch_strategy previous

#tab_fade 0.25 0.5 0.75 1

tab_separator " | "
tab_powerline_style slanted
tab_activity_symbol "•"

tab_title_max_length 25
tab_title_template "{fmt.fg.yellow}{bell_symbol}{activity_symbol}{fmt.fg.tab}{title}"
#active_tab_title_template none

#active_tab_foreground   #000
#active_tab_background   #eee
#active_tab_font_style   bold-italic
#inactive_tab_foreground #444
#inactive_tab_background #999
#inactive_tab_font_style normal

#tab_bar_background none

#tab_bar_margin_color none

# ==== Display =============================================

background_opacity 0.7
#background_blur 0

#background_image none
#background_image_layout tiled
#background_image_linear no

#dynamic_background_opacity no

#background_tint 0.0
#background_tint_gaps 1.0

#dim_opacity 0.4

# ==== Color scheme ========================================

#include themes/vscode-dark.conf
#include themes/mocha.conf
#include themes/diff-mocha.conf

#foreground #dddddd
#background #000000

#selection_foreground #000000
#selection_background #fffacd

# ---- The color table ---------------------------

# black
#color0 #000000
#color8 #767676

# red
#color1 #cc0403
#color9 #f2201f

# green
#color2  #19cb00
#color10 #23fd00

# yellow
#color3  #cecb00
#color11 #fffd00

# blue
#color4  #0d73cc
#color12 #1a8fff

# magenta
#color5  #cb1ed1
#color13 #fd28ff

# cyan
#color6  #0dcdcd
#color14 #14ffff

# white
#color7  #dddddd
#color15 #ffffff

#mark1_foreground black
#mark1_background #98d3cb
#mark2_foreground black
#mark2_background #f2dcd3
#mark3_foreground black
#mark3_background #f274bc

# ==== Advanced ============================================

#shell .
#editor .

#close_on_child_death no

#remote_control_password
# Possible values: password, socket-only, socket, no, yes
allow_remote_control socket
listen_on unix:kitty

#env

#watcher

#exe_search_path

#update_check_interval 24

#startup_session none

#clipboard_control write-clipboard write-primary read-clipboard-ask read-primary-ask

#clipboard_max_size 512

#file_transfer_confirmation_bypass

#allow_hyperlinks yes

#shell_integration enabled

#allow_cloning ask

# Supported strategies: venv, conda, env_var, path
#clone_source_strategies venv,conda,env_var,path

# Needs shell_integration. Possible values: never, unfocused, invisible,
# always. Optional arguments are [duration] and [action], where action is one
# of notify, bell, command
#notify_on_cmd_finish never

#term xterm-kitty
#terminfo_type path

#forward_stdio no

#menu_map

# ==== OS specific tweaks ==================================

#macos_titlebar_color system
#macos_option_as_alt no
#macos_hide_from_tasks no
#macos_quit_when_last_window_closed no
#macos_window_resizable yes
#macos_thicken_font 0
#macos_traditional_fullscreen no
#macos_show_window_title_in all
#macos_menubar_title_max_length 0
#macos_custom_beam_cursor no
#macos_colorspace srgb

#linux_display_server auto
#wayland_enable_ime yes
#wayland_titlebar_color system

# ==== Keyboard shortcuts ==================================

# Actions: <https://sw.kovidgoyal.net/kitty/actions/>.

#kitty_mod ctrl+shift

#clear_all_shortcuts no

#action_alias

#kitten_alias

# ---- Clipboard ---------------------------------

# Copy to clipboard
#map kitty_mod+c copy_to_clipboard
#map cmd+c       copy_to_clipboard

# Paste from clipboard
#map kitty_mod+v paste_from_clipboard
#map cmd+v       paste_from_clipboard

# Paste from selection
#map kitty_mod+s  paste_from_selection
#map shift+insert paste_from_selection

# Pass selection to program
#map kitty_mod+o pass_selection_to_program

# ---- Scrolling ---------------------------------

# Scroll line up
#map kitty_mod+up    scroll_line_up
#map kitty_mod+k     scroll_line_up
#map opt+cmd+page_up scroll_line_up
#map cmd+up          scroll_line_up

# Scroll line down
#map kitty_mod+down    scroll_line_down
#map kitty_mod+j       scroll_line_down
#map opt+cmd+page_down scroll_line_down
#map cmd+down          scroll_line_down

# Scroll page up
#map kitty_mod+page_up scroll_page_up
#map cmd+page_up       scroll_page_up

# Scroll page down
#map kitty_mod+page_down scroll_page_down
#map cmd+page_down       scroll_page_down

# Scroll to top
#map kitty_mod+home scroll_home
#map cmd+home       scroll_home

# Scroll to bottom
#map kitty_mod+end scroll_end
#map cmd+end       scroll_end

# Scroll to previous shell prompt
#map kitty_mod+z scroll_to_prompt -1

# Scroll to next shell prompt
#map kitty_mod+x scroll_to_prompt 1

# Browse scrollback buffer in pager
#map kitty_mod+h show_scrollback

# Browse output of the last shell command in pager
#map kitty_mod+g show_last_command_output

# ---- Window management -------------------------

# New window
map kitty_mod+enter new_window_with_cwd
map kitty_mod+alt+enter new_window
#map cmd+enter       new_window
map kitty_mod+b>% launch --cwd=current --location=vsplit
map kitty_mod+b>" launch --cwd=current --location=hsplit
map kitty_mod+b>- layout_action rotate

# New OS window
map kitty_mod+n new_os_window_with_cwd
#map cmd+n       new_os_window

# Close window
#map kitty_mod+w close_window
#map shift+cmd+d close_window

# Next window
#map kitty_mod+] next_window
map ctrl+alt+j next_window

# Previous window
#map kitty_mod+[ previous_window
map ctrl+alt+k previous_window

# Move window forward
#map kitty_mod+f move_window_forward
map ctrl+alt+shift+j move_window_forward

# Move window backward
#map kitty_mod+b move_window_backward
map ctrl+alt+shift+k move_window_backward

# Move window to top
#map kitty_mod+` move_window_to_top

# Start resizing window
#map kitty_mod+r start_resizing_window
#map cmd+r       start_resizing_window

# Select windows

#map kitty_mod+1 first_window
#map cmd+1       first_window
#map kitty_mod+2 second_window
#map cmd+2       second_window
#map kitty_mod+3 third_window
#map cmd+3       third_window
#map kitty_mod+4 fourth_window
#map cmd+4       fourth_window
#map kitty_mod+5 fifth_window
#map cmd+5       fifth_window
#map kitty_mod+6 sixth_window
#map cmd+6       sixth_window
#map kitty_mod+7 seventh_window
#map cmd+7       seventh_window
#map kitty_mod+8 eighth_window
#map cmd+8       eighth_window
#map kitty_mod+9 ninth_window
#map cmd+9       ninth_window
#map kitty_mod+0 tenth_window

# Visually select and focus window
#map kitty_mod+f7 focus_visible_window

# Visually swap window with another
#map kitty_mod+f8 swap_with_window

# ---- Tab management ----------------------------

# Next tab
#map kitty_mod+right next_tab
map ctrl+alt+l      next_tab
#map shift+cmd+]     next_tab
#map ctrl+tab        next_tab

# Previous tab
#map kitty_mod+left previous_tab
map ctrl+alt+h    previous_tab
#map shift+cmd+[    previous_tab
#map ctrl+shift+tab previous_tab

# Move tab forward
map ctrl+alt+shift+l move_tab_forward

# Move tab backward
map ctrl+alt+shift+h move_tab_backward

# New tab
map kitty_mod+t new_tab_with_cwd
map kitty_mod+alt+t new_tab
#map cmd+t       new_tab

# Close tab
#map kitty_mod+q close_tab
#map cmd+w       close_tab

# Close OS window
#map shift+cmd+w close_os_window

# Set tab title
#map kitty_mod+alt+t set_tab_title
#map shift+cmd+i     set_tab_title
map kitty_mod+f2 set_tab_title

# You can also create shortcuts to go to specific tabs, with 1 being
# the first tab, 2 the second tab and -1 being the previously active
# tab, and any number larger than the last tab being the last tab::

map ctrl+alt+1 goto_tab 1
map ctrl+alt+2 goto_tab 2

# ---- Layout management -------------------------

# Layouts managed with prefix mod+l
map kitty_mod+l>n next_layout
map kitty_mod+l>- last_used_layout
map kitty_mod+l>s goto_layout splits
map kitty_mod+l>t goto_layout tall
map kitty_mod+l>f goto_layout fat
map kitty_mod+l>h goto_layout horizontal
map kitty_mod+l>v goto_layout vertical

# ---- Font sizes --------------------------------

# Increase font size
map kitty_mod+equal  change_font_size current +1.0
map kitty_mod+plus   change_font_size current +1.0
map kitty_mod+kp_add change_font_size current +1.0
#map cmd+plus         change_font_size all +2.0
#map cmd+equal        change_font_size all +2.0
#map shift+cmd+equal  change_font_size all +2.0

# Decrease font size
map kitty_mod+minus       change_font_size current -1.0
map kitty_mod+kp_subtract change_font_size current -1.0
#map cmd+minus             change_font_size all -2.0
#map shift+cmd+minus       change_font_size all -2.0

# Reset font size
#map kitty_mod+backspace change_font_size all 0
#map cmd+0               change_font_size all 0

# ---- Select and act on visible text ------------

# Open URL
#map kitty_mod+e open_url_with_hints

# Insert selected path
#map kitty_mod+p>f kitten hints --type path --program -

# Open selected path
#map kitty_mod+p>shift+f kitten hints --type path

# Insert selected line
#map kitty_mod+p>l kitten hints --type line --program -

# Insert selected word
#map kitty_mod+p>w kitten hints --type word --program -

# Insert selected hash
#map kitty_mod+p>h kitten hints --type hash --program -

# Open the selected file at the selected line
#map kitty_mod+p>n kitten hints --type linenum

# Open the selected hyperlink
#map kitty_mod+p>y kitten hints --type hyperlink

# Hints kitten docs: <https://sw.kovidgoyal.net/kitty/kittens/hints/>.

# ---- Miscellaneous -----------------------------

# Show documentation
#map kitty_mod+f1 show_kitty_doc overview

# Toggle fullscreen
#map kitty_mod+f11 toggle_fullscreen
#map ctrl+cmd+f    toggle_fullscreen

# Toggle maximized
#map kitty_mod+f10 toggle_maximized

# Toggle macOS secure keyboard entry
#map opt+cmd+s toggle_macos_secure_keyboard_entry

# Unicode input
#map kitty_mod+u    kitten unicode_input
#map ctrl+cmd+space kitten unicode_input

# Edit config file
map kitty_mod+, edit_config_file
#map cmd+,        edit_config_file

# Open the kitty command shell
#map kitty_mod+escape kitty_shell window

# Increase background opacity
#map kitty_mod+a>m set_background_opacity +0.1

# Decrease background opacity
#map kitty_mod+a>l set_background_opacity -0.1

# Make background fully opaque
#map kitty_mod+a>1 set_background_opacity 1

# Reset background opacity
#map kitty_mod+a>d set_background_opacity default

# Reset the terminal
#map kitty_mod+delete clear_terminal reset active
#map opt+cmd+r        clear_terminal reset active

# Clear up to cursor line
#map cmd+k clear_terminal to_cursor active

# Reload kitty.conf
#map kitty_mod+f5 load_config_file
#map ctrl+cmd+,   load_config_file

# Debug kitty configuration
#map kitty_mod+f6 debug_config
#map opt+cmd+,    debug_config

# Send arbitrary text on key presses
#map ctrl+shift+alt+h send_text all Hello World
# Output a word and move the cursor to the start of the line (like typing and
# pressing Home)
#map ctrl+alt+a send_text normal Word\e[H
#map ctrl+alt+a send_text application Word\eOH
# Run a command at a shell prompt (like typing the command and pressing Enter)
#map ctrl+alt+a send_text normal,application some command with arguments\r

# Open kitty Website
#map shift+cmd+/ open_url https://sw.kovidgoyal.net/kitty/

# Hide macOS kitty application
#map cmd+h hide_macos_app

# Hide macOS other applications
#map opt+cmd+h hide_macos_other_apps

# Minimize macOS window
#map cmd+m minimize_macos_window

# Quit kitty
#map cmd+q quit

# ==== Includes ============================================

# Inlcude drop-in config files in the kitty config dir
globinclude *.d.conf

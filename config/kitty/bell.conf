# Kitty bell config
# See kitty.conf(5)

# ==== Terminal bell =======================================

enable_audio_bell yes

visual_bell_duration 0.15
visual_bell_color darkred

window_alert_on_bell yes

#bell_on_tab "🔔 "

#command_on_bell none

bell_path /usr/share/sounds/freedesktop/stereo/bell.oga

#linux_bell_theme __custom
